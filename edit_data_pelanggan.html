<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Pelanggan</title>
    <link rel="stylesheet" href="css/pelanggan.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="profile"><i class="fa-solid fa-circle-user"></i> <span>Nama User</span></div>
        <ul>
            <li><a href="dashboard.html" style="color:white; text-decoration:none;"><i class="fa-solid fa-desktop"></i> Dashboard</a></li>
            <li><a href="pesanan.html" style="color:white; text-decoration:none;"><i class="fa-solid fa-pen-to-square"></i> Pesanan</a></li>
            <li class="active"><i class="fa-solid fa-user-group"></i> Pelanggan</li>
            <li><a href="pembayaran.html" style="color:white; text-decoration:none;"><i class="fas fa-wallet"></i> Pembayaran</a></li>
            <li><a href="laporan.html" style="color:white; text-decoration:none;"><i class="fas fa-clock"></i> Laporan</a></li>
            
        </ul>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <a href="detail_pelanggan.html" style="text-decoration: none; color: white; font-size: 14px;">
                <i class="fa-solid fa-chevron-left"></i> Kembali ke Detail / <strong>Edit Data Pelanggan</strong>
            </a>
        </div>
        <div class="dashboard-body">
            <div style="background: white; padding: 30px; border-radius: 8px; border: 1px solid #ddd; max-width: 600px; margin: 0 auto;">
                <h3 style="margin-top: 0; margin-bottom: 25px; text-align: center;">Edit Profil Pelanggan</h3>
                <form action="detail_pelanggan.html">
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Nama Pelanggan</label>
                        <input type="text" value="Sherin" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">No HP</label>
                        <input type="text" value="08123456789" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 25px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Alamat</label>
                        <textarea style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; height: 80px;">Jl. Mawar No. 5</textarea>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" onclick="history.back()" style="flex: 1; padding: 10px; background: #eee; border: 1px solid #ccc; cursor: pointer; border-radius: 4px; font-weight: bold;">Batal</button>
                        <button type="submit" style="flex: 1; padding: 10px; background: #1d7a6c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;">Simpan Perubahan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
